<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrarpoint Rebuild</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f1226;color:#fff}
.container{display:flex;flex-direction:column;height:100vh}
header{padding:10px;background:#1a1f3a}
main{flex:1;display:flex}
.sidebar{width:200px;background:#151932;padding:10px}
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow:auto;padding:10px}
.input{display:flex}
input{flex:1;padding:10px;border:none}
button{padding:10px}
.msg{margin:5px 0}
.me{color:#00e5ff}
</style>
</head>
<body>
<div class="container">
<header>
<h3>Abrarpoint Chat</h3>
</header>
<main>
<div class="sidebar">
<h4>Users</h4>
<div id="users"></div>
</div>
<div class="chat">
<div class="messages" id="messages"></div>
<div class="input">
<input id="msg" placeholder="Ketik...">
<button onclick="send()">Kirim</button>
</div>
</div>
</main>
</div>
<script>
const API='https://jsonblob.com/api/jsonBlob';
let room=localStorage.getItem('room')||'';
let name=localStorage.getItem('name')||prompt('Nama lu siapa?');
localStorage.setItem('name',name);

async function init(){
 if(!room){
  const res=await fetch(API,{method:'POST',body:JSON.stringify({msgs:[]})});
  room=res.headers.get('Location').split('/').pop();
  localStorage.setItem('room',room);
 }
 load();
 setInterval(load,2000);
}

async function load(){
 const res=await fetch(API+'/'+room);
 const data=await res.json();
 render(data.msgs||[]);
}

function render(msgs){
 const el=document.getElementById('messages');
 el.innerHTML='';
 msgs.forEach(m=>{
  const d=document.createElement('div');
  d.className='msg'+(m.name===name?' me':'');
  d.textContent=m.name+': '+m.text;
  el.appendChild(d);
 });
 el.scrollTop=el.scrollHeight;
}

async function send(){
 const input=document.getElementById('msg');
 const text=input.value.trim();
 if(!text)return;
 input.value='';
 const res=await fetch(API+'/'+room);
 const data=await res.json();
 const msgs=data.msgs||[];
 msgs.push({name,text});
 await fetch(API+'/'+room,{method:'PUT',body:JSON.stringify({msgs})});
 load();
}

init();
</script>
</body>
</html>
